name: Ingestion CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'terraform/**'

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Pytest
        run: |
          # Create init files to ensure proper module discovery
          touch src/__init__.py src/core/__init__.py tests/__init__.py tests/unit/__init__.py
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/unit/ -v --cov=src/core --cov-report=xml

  terraform:
    needs: test-and-build
    runs-on: ubuntu-latest
    env:
      # Logical separation: 'prod' for main branch, 'dev' for everything else
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      # Consistently using your verified Project ID
      GCP_PROJECT_ID: 'dws-project-mar26'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/1081882450721/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-terraform@dws-project-mar26.iam.gserviceaccount.com'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          # Use DEPLOY_ENV to keep 'dev' and 'prod' state files separate in the same bucket
          terraform init \
            -backend-config="bucket=dws-tf-state-mar26" \
            -backend-config="prefix=terraform/state/${{ env.DEPLOY_ENV }}"
            
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var-file="environments/${{ env.DEPLOY_ENV }}/terraform.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="DEPLOY_ENV=${{ env.DEPLOY_ENV }}" \
            -out=tfplan

      - name: Terraform Apply
        # Only deploy to 'prod' if we are pushing/merging to main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan