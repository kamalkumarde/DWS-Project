name: Ingestion CI
on:
  push:
    paths: ['src/**', 'tests/**', 'requirements.txt'] # Added requirements.txt to trigger
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silences the Node warning
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Best practice for faster builds

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov # Ensure test runners are installed

      - name: Run Pytest
        run: |
          # Use 'python -m pytest' to avoid 'command not found' (127) errors
          python -m pytest tests/unit --cov=src