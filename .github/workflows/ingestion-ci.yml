name: Ingestion CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'terraform/**'

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches your stable dev environment
          cache: 'pip'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Pytest
        run: |
          # Ensure Python treats directories as packages for imports
          find . -name "__init__.py" -delete # Clean old ones
          touch src/__init__.py src/core/__init__.py tests/__init__.py tests/unit/__init__.py
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/unit/ -v --cov=src/core --cov-report=xml

  terraform:
    needs: test-and-build
    runs-on: ubuntu-latest
    # Explicitly set the variables here
    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      GCP_PROJECT_ID: ${{ github.ref == 'refs/heads/main' && 'dws-project-prod' || 'dws-project-mar26' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          # Use the exact full string for the provider
          workload_identity_provider: 'projects/1081882450721/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          # Use the environment variable we just set
          service_account: 'github-actions-terraform@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      # Add a diagnostic step to confirm auth worked before Terraform starts
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Verify Auth'
        run: gcloud auth list