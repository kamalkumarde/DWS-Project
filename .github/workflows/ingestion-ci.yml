name: Ingestion CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "terraform/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "terraform/**"

permissions:
  contents: read
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pytest
        run: |
          export PYTHONPATH="$(pwd):${PYTHONPATH}"
          python -m pytest tests/unit/ -v --cov=src/core --cov-report=xml

  terraform:
    needs: test-and-build
    runs-on: ubuntu-latest

    # Skip terraform job on external fork PRs (prevents this exact auth error)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    env:
      GCP_PROJECT_ID: 'dws-project-mar26'
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: 'projects/1081882450721/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-terraform@dws-project-mar26.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=dws-tf-state-mar26" \
            -backend-config="prefix=terraform/state/${{ env.DEPLOY_ENV }}"
    
      - name: Debug Terraform State
        working-directory: ./terraform
        run: |
          terraform version
          terraform providers
          terraform state list || true

      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan \
            -var-file="environments/${{ env.DEPLOY_ENV }}/terraform.tfvars" \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="DEPLOY_ENV=${{ env.DEPLOY_ENV }}" \
            -out=tfplan

      - name: Show Terraform Plan
        working-directory: ./terraform
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan