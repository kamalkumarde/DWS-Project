name: 1PB Data Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Required permissions for Workload Identity Federation
permissions:
  contents: read
  id-token: write

jobs:
  # --- STAGE 1: Quality Control ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Unit Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/unit/ -v --cov=src --cov-report=xml

  # --- STAGE 2: Terraform Checks (runs on PRs and push) ---
  terraform-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform Validate (Prod)
        working-directory: terraform/environments/prod
        run: terraform validate

  # --- STAGE 3: Production Deployment ---
  deploy-prod:
    needs: [test, terraform-check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      # Recommended: Workload Identity Federation (keyless & secure)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA_EMAIL }}
          token_format: 'access_token'

      - name: Build and Push Ingestor Image
        run: |
          gcloud auth configure-docker gcr.io
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/ingestor-worker:${{ github.sha }} .
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/ingestor-worker:${{ github.sha }}

      - name: Terraform Init & Plan
        working-directory: terraform/environments/prod
        run: |
          terraform init
          terraform plan -out=tfplan

      - name: Show Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve tfplan

      - name: Post-Deploy Smoke Test
        run: |
          echo "→ Sending 1 test message to prod Pub/Sub topic..."
          python src/workers/load_tester.py --count 1 --env prod || echo "Warning: load_tester failed"

          echo "→ Waiting 30 seconds for processing..."
          sleep 30

          echo "→ Checking raw files in lake bucket..."
          gsutil ls "gs://dws-lake-prod/raw/dt=$(date +%Y%m%d)/*.jsonl" || echo "No files found yet (this can be normal on first run)"